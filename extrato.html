<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>PoppeFin | Extrato Detalhado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
        }

        .card-entrada { border-left: 4px solid #10b981; background: rgba(16, 185, 129, 0.04); }
        .card-saida   { border-left: 4px solid #f43f5e; background: rgba(244, 63, 94, 0.04); }
        .card-rendimento { border-left: 4px solid #6366f1; background: rgba(99, 102, 241, 0.04); }

        #export-area-tecnica {
            position: absolute;
            left: -9999px;
            width: 1080px;
            padding: 60px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .logo-pdf { font-size: 85px; font-weight: 800; color: #1e293b; text-align: center; margin-bottom: 10px; }
        .logo-pdf span { color: #4f46e5; }

        /* Loading bar */
        .loading-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #6366f1);
            background-size: 200% 100%;
            z-index: 999;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }
        .loading-bar.ativo { transform: scaleX(1); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 41, 59, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Modal sheet */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        /* Animações */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mov-card { animation: slideUp 0.3s ease-out both; }

        /* Chips de filtro */
        .tipo-chip {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            border: 1.5px solid #e2e8f0;
            color: #64748b;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tipo-chip.ativo-todos    { background: #1e293b; color: white; border-color: #1e293b; }
        .tipo-chip.ativo-entrada  { background: #10b981; color: white; border-color: #10b981; }
        .tipo-chip.ativo-saida    { background: #f43f5e; color: white; border-color: #f43f5e; }
        .tipo-chip.ativo-rend     { background: #6366f1; color: white; border-color: #6366f1; }

        .filtros-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .filtros-scroll::-webkit-scrollbar { display: none; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
            z-index: 50;
            padding: 8px 0 env(safe-area-inset-bottom);
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-wave 1.5s infinite;
            border-radius: 16px;
        }
        @keyframes skeleton-wave {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Grupo por data */
        .data-group-label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 4px 4px;
        }

        /* Sessão ticker */
        .session-dot {
            width: 6px; height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .session-dot.warning { background: #f59e0b; }
        .session-dot.danger  { background: #f43f5e; }
    </style>
</head>
<body class="text-slate-800">

    <div id="loadingBar" class="loading-bar"></div>
    <div id="toastMsg" class="toast"></div>
    <div id="export-area-tecnica"></div>

    <!-- Modal Sessão Expirando -->
    <div id="modalSessao" class="modal-overlay">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm shadow-2xl mx-4">
            <div class="text-center">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-clock text-amber-500 text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">Sessão Expirando</h3>
                <p class="text-slate-500 text-sm mb-6">Inativo por 9 min. Deseja continuar?</p>
                <div class="flex gap-3">
                    <button onclick="sairSistema()" class="flex-1 py-3 font-bold text-slate-500 bg-slate-100 rounded-xl active:scale-95">Sair</button>
                    <button onclick="renovarSessao()" class="flex-1 py-3 font-bold bg-indigo-600 text-white rounded-xl shadow-lg active:scale-95">Continuar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-4">

        <!-- Header -->
        <div>
            <div class="flex items-center justify-between">
                <div>
                    <button onclick="window.location.href='dashboard.html'"
                        class="text-indigo-600 font-bold text-sm mb-2 flex items-center gap-2 active:scale-95 transition-all">
                        <i class="fas fa-arrow-left text-xs"></i> Dashboard
                    </button>
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">Poppe<span class="text-indigo-600">Fin</span> Extrato</h1>
                    <p class="text-slate-500 text-xs font-medium">Histórico de movimentações</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="hidden md:flex items-center gap-2 mr-1">
                        <div class="session-dot" id="sessionDot"></div>
                        <span id="sessionTime" class="text-[11px] font-bold text-slate-400">10:00</span>
                    </div>
                    <button onclick="carregarDados()"
                        class="w-10 h-10 bg-white/60 rounded-xl flex items-center justify-center shadow-sm active:scale-95">
                        <i class="fas fa-sync-alt text-indigo-500 text-sm" id="iconSync"></i>
                    </button>
                    <button id="btnExport" onclick="exportarPDF()"
                        class="h-10 px-4 bg-indigo-600 text-white rounded-xl font-bold text-sm flex items-center gap-2 shadow-lg shadow-indigo-200 active:scale-95">
                        <i class="fas fa-file-pdf"></i>
                        <span class="hidden md:inline">Exportar PDF</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="glass-card p-4 rounded-[24px] space-y-3">
            <!-- Linha 1: Conta + Período -->
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 ml-1">Conta</label>
                    <select id="filtroConta" onchange="filtrarExtrato()"
                        class="bg-white border-none p-2.5 rounded-xl outline-none shadow-sm text-sm font-semibold text-slate-700 cursor-pointer"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 ml-1">Período</label>
                    <select id="filtroPeriodo" onchange="filtrarExtrato()"
                        class="bg-white border-none p-2.5 rounded-xl outline-none shadow-sm text-sm font-semibold text-slate-700 cursor-pointer">
                        <option value="0">Tudo</option>
                        <option value="1">1 Mês</option>
                        <option value="3">3 Meses</option>
                        <option value="12">1 Ano</option>
                    </select>
                </div>
            </div>
            <!-- Linha 2: Chips de tipo (scroll horizontal) -->
            <div class="filtros-scroll">
                <button class="tipo-chip ativo-todos" onclick="setTipo('TODOS', this)">
                    <i class="fas fa-th-list mr-1"></i> Todos
                </button>
                <button class="tipo-chip" onclick="setTipo('Entrada', this)">
                    <i class="fas fa-arrow-down mr-1"></i> Entradas
                </button>
                <button class="tipo-chip" onclick="setTipo('Saída', this)">
                    <i class="fas fa-arrow-up mr-1"></i> Saídas
                </button>
                <button class="tipo-chip" onclick="setTipo('Rendimento', this)">
                    <i class="fas fa-chart-line mr-1"></i> Rendimentos
                </button>
            </div>
        </div>

        <!-- Painel de somas -->
        <div id="painelSomas" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

        <!-- Contador de resultados -->
        <div class="flex items-center justify-between px-1">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wide" id="contadorResultados">— registros</p>
            <p class="text-[11px] font-bold text-slate-400" id="lastUpdated"></p>
        </div>

        <!-- Lista de movimentações agrupadas por data -->
        <div id="containerExtrato" class="space-y-1 pb-4"></div>

    </div>

    <!-- Bottom Nav Mobile -->
    <nav class="bottom-nav md:hidden">
        <div class="flex items-center justify-around px-4">
            <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 py-1 text-slate-400">
                <i class="fas fa-chart-pie text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Dashboard</span>
            </button>
            <button class="flex flex-col items-center gap-1 py-1 text-indigo-600">
                <i class="fas fa-list-ul text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Extrato</span>
            </button>
            <button onclick="window.location.href='lancamento.html'"
                class="flex flex-col items-center gap-1 py-1 -mt-6">
                <div class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg shadow-indigo-300">
                    <i class="fas fa-plus text-white text-xl"></i>
                </div>
            </button>
            <button onclick="exportarPDF()" class="flex flex-col items-center gap-1 py-1 text-slate-400">
                <i class="fas fa-file-pdf text-lg"></i>
                <span class="text-[9px] font-bold uppercase">PDF</span>
            </button>
            <button onclick="carregarDados()" class="flex flex-col items-center gap-1 py-1 text-slate-400">
                <i class="fas fa-sync-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase">Sync</span>
            </button>
        </div>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoapiR4Mtjic8yLSjCcZ4I1dsClIMyV6ReaPmzYmNxKa4wUpEEAKUGBnDmc_XAqxZ1Bw/exec';
        let dadosRaw = [];
        let filtroTipoAtivo = 'TODOS';

        // =============================================
        // SESSÃO - 10 minutos
        // =============================================
        const TIMEOUT_MS = 10 * 60 * 1000;
        const WARNING_MS = 9 * 60 * 1000;
        let sessionTimer, warningTimer, countdownInterval;
        let sessionRemaining = TIMEOUT_MS;

        function iniciarSessao() {
            clearTimeout(sessionTimer);
            clearTimeout(warningTimer);
            clearInterval(countdownInterval);
            sessionRemaining = TIMEOUT_MS;
            atualizarTicker();

            countdownInterval = setInterval(() => {
                sessionRemaining -= 1000;
                if (sessionRemaining <= 0) { clearInterval(countdownInterval); sairSistema(); }
                else atualizarTicker();
            }, 1000);

            warningTimer = setTimeout(() => {
                document.getElementById('modalSessao').style.display = 'flex';
            }, WARNING_MS);

            sessionTimer = setTimeout(sairSistema, TIMEOUT_MS);
        }

        function atualizarTicker() {
            const mins = Math.floor(sessionRemaining / 60000);
            const secs = Math.floor((sessionRemaining % 60000) / 1000);
            const el = document.getElementById('sessionTime');
            const dot = document.getElementById('sessionDot');
            if (el) el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            if (dot) {
                dot.className = 'session-dot';
                if (sessionRemaining < 60000) dot.classList.add('danger');
                else if (sessionRemaining < 180000) dot.classList.add('warning');
            }
        }

        function renovarSessao() {
            document.getElementById('modalSessao').style.display = 'none';
            iniciarSessao();
            mostrarToast('Sessão renovada ✓');
        }

        function sairSistema() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        ['touchstart', 'click', 'keydown', 'scroll'].forEach(ev => {
            document.addEventListener(ev, iniciarSessao, { passive: true });
        });

        // =============================================
        // PERSISTÊNCIA
        // =============================================
        function salvarEstado() {
            sessionStorage.setItem('extratoEstado', JSON.stringify({
                filtroConta: document.getElementById('filtroConta').value,
                filtroPeriodo: document.getElementById('filtroPeriodo').value,
                filtroTipo: filtroTipoAtivo
            }));
        }

        function restaurarEstado() {
            const saved = sessionStorage.getItem('extratoEstado');
            if (!saved) return;
            const e = JSON.parse(saved);
            if (e.filtroTipo && e.filtroTipo !== 'TODOS') {
                filtroTipoAtivo = e.filtroTipo;
                // Ativar chip correto
                document.querySelectorAll('.tipo-chip').forEach(chip => {
                    chip.className = 'tipo-chip';
                    if (chip.getAttribute('data-tipo') === e.filtroTipo) {
                        const cls = { 'Entrada': 'ativo-entrada', 'Saída': 'ativo-saida', 'Rendimento': 'ativo-rend' };
                        chip.classList.add(cls[e.filtroTipo] || 'ativo-todos');
                    }
                });
            }
            return e;
        }

        // =============================================
        // TOAST
        // =============================================
        function mostrarToast(msg) {
            const t = document.getElementById('toastMsg');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // =============================================
        // DADOS
        // =============================================
        async function carregarDados() {
            const icon = document.getElementById('iconSync');
            const lb = document.getElementById('loadingBar');
            icon.classList.add('animate-spin');
            lb.classList.add('ativo');

            // Skeleton
            document.getElementById('containerExtrato').innerHTML = `
                <div class="skeleton h-16 mb-2"></div>
                <div class="skeleton h-16 mb-2"></div>
                <div class="skeleton h-16 mb-2"></div>
                <div class="skeleton h-16 mb-2"></div>
            `;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getDashboard&t=${Date.now()}`);
                dadosRaw = await response.json();
                sessionStorage.setItem('extratoData', JSON.stringify(dadosRaw));
                popularFiltroContas();

                const estado = restaurarEstado();
                if (estado) {
                    const sel = document.getElementById('filtroConta');
                    if ([...sel.options].some(o => o.value === estado.filtroConta)) sel.value = estado.filtroConta;
                    const selP = document.getElementById('filtroPeriodo');
                    if ([...selP.options].some(o => o.value === estado.filtroPeriodo)) selP.value = estado.filtroPeriodo;
                }

                filtrarExtrato();
                const now = new Date().toLocaleTimeString('pt-br', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-check-circle text-emerald-400 mr-1"></i>Sync ${now}`;
                mostrarToast('Dados atualizados ✓');
            } catch (e) {
                mostrarToast('Erro ao carregar');
                const cached = sessionStorage.getItem('extratoData');
                if (cached) {
                    dadosRaw = JSON.parse(cached);
                    popularFiltroContas();
                    filtrarExtrato();
                } else {
                    document.getElementById('containerExtrato').innerHTML =
                        '<p class="text-center text-slate-400 py-10 text-sm">Sem conexão. Tente novamente.</p>';
                }
            } finally {
                icon.classList.remove('animate-spin');
                lb.classList.remove('ativo');
            }
        }

        function popularFiltroContas() {
            const select = document.getElementById('filtroConta');
            const contas = {};
            dadosRaw.forEach(d => { contas[d['ID Conta']] = `${d['Banco']} - ${d['Descrição']}`; });
            select.innerHTML = '<option value="TODAS">Todas as Contas</option>';
            Object.entries(contas).forEach(([id, nome]) => {
                select.innerHTML += `<option value="${id}">${nome}</option>`;
            });
        }

        function formatarMoeda(v) { return v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }); }

        function setTipo(tipo, btn) {
            filtroTipoAtivo = tipo;
            document.querySelectorAll('.tipo-chip').forEach(c => c.className = 'tipo-chip');
            const cls = { 'TODOS': 'ativo-todos', 'Entrada': 'ativo-entrada', 'Saída': 'ativo-saida', 'Rendimento': 'ativo-rend' };
            btn.classList.add(cls[tipo]);
            filtrarExtrato();
            salvarEstado();
        }

        function filtrarExtrato() {
            const fConta = document.getElementById('filtroConta').value;
            const fPeriodo = parseInt(document.getElementById('filtroPeriodo').value);
            const container = document.getElementById('containerExtrato');
            const agora = new Date();

            container.innerHTML = '';
            let sEntrada = 0, sSaida = 0, sRend = 0;

            let filtrados = dadosRaw.filter(d => {
                const dataMov = new Date(d['Data']);
                const matchConta = fConta === 'TODAS' || String(d['ID Conta']) === fConta;
                let matchPeriodo = true;
                if (fPeriodo > 0) {
                    const limite = new Date();
                    limite.setMonth(agora.getMonth() - fPeriodo);
                    matchPeriodo = dataMov >= limite;
                }
                return matchConta && matchPeriodo;
            });

            filtrados.sort((a, b) => new Date(b['Data']) - new Date(a['Data']));

            // Agrupar por data
            const grupos = {};
            let totalCards = 0;

            filtrados.forEach(mov => {
                const vA = parseFloat(mov['Valor Aporte']) || 0;
                const vR = parseFloat(mov['Valor Rendimento']) || 0;
                const dataChave = new Date(mov['Data']).toLocaleDateString('pt-br');
                if (!grupos[dataChave]) grupos[dataChave] = [];

                if (vA > 0 && (filtroTipoAtivo === 'TODOS' || filtroTipoAtivo === mov['Tipo'])) {
                    if (mov['Tipo'] === 'Entrada') sEntrada += vA; else sSaida += vA;
                    grupos[dataChave].push({ dataF: dataChave, ...mov, valorExibido: vA, tipoExibido: mov['Tipo'] });
                    totalCards++;
                }
                if (vR > 0 && (filtroTipoAtivo === 'TODOS' || filtroTipoAtivo === 'Rendimento')) {
                    sRend += vR;
                    grupos[dataChave].push({ dataF: dataChave, ...mov, valorExibido: vR, tipoExibido: 'Rendimento' });
                    totalCards++;
                }
            });

            document.getElementById('contadorResultados').textContent = `${totalCards} registro${totalCards !== 1 ? 's' : ''}`;

            if (totalCards === 0) {
                container.innerHTML = `
                    <div class="text-center py-16">
                        <i class="fas fa-search text-slate-200 text-4xl mb-4"></i>
                        <p class="text-slate-400 font-semibold text-sm">Nenhuma movimentação encontrada</p>
                        <p class="text-slate-300 text-xs mt-1">Tente ajustar os filtros</p>
                    </div>`;
                atualizarSomas(0, 0, 0);
                return;
            }

            let delay = 0;
            Object.entries(grupos).forEach(([data, movs]) => {
                if (movs.length === 0) return;

                // Label de data com dia da semana
                const d = movs[0].Data ? new Date(movs[0].Data) : new Date();
                const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                const diaSemana = diasSemana[d.getDay()];
                const hoje = new Date().toLocaleDateString('pt-br');
                const ontem = new Date(Date.now() - 86400000).toLocaleDateString('pt-br');
                let labelData = `${diaSemana} · ${data}`;
                if (data === hoje) labelData = `Hoje · ${data}`;
                else if (data === ontem) labelData = `Ontem · ${data}`;

                container.innerHTML += `<p class="data-group-label">${labelData}</p>`;

                movs.forEach((m, i) => {
                    delay += 40;
                    container.innerHTML += criarCardHTML(m, delay);
                });
            });

            atualizarSomas(sEntrada, sSaida, sRend);
            salvarEstado();
        }

        function atualizarSomas(e, s, r) {
            document.getElementById('painelSomas').innerHTML = `
                <div class="glass-card p-4 rounded-2xl border-b-4 border-emerald-500">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-6 h-6 bg-emerald-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-arrow-down text-emerald-500 text-[10px]"></i>
                        </div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Entradas</p>
                    </div>
                    <p class="text-base font-bold text-emerald-600">${formatarMoeda(e)}</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-rose-500">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-6 h-6 bg-rose-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-arrow-up text-rose-500 text-[10px]"></i>
                        </div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Saídas</p>
                    </div>
                    <p class="text-base font-bold text-rose-600">${formatarMoeda(s)}</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-indigo-500">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-6 h-6 bg-indigo-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-chart-line text-indigo-500 text-[10px]"></i>
                        </div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Rendimento</p>
                    </div>
                    <p class="text-base font-bold text-indigo-600">${formatarMoeda(r)}</p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-b-4 border-slate-800">
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-6 h-6 bg-slate-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-balance-scale text-slate-600 text-[10px]"></i>
                        </div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Saldo</p>
                    </div>
                    <p class="text-base font-bold ${(e+r-s) >= 0 ? 'text-slate-800' : 'text-rose-600'}">${formatarMoeda(e + r - s)}</p>
                </div>`;
        }

        function criarCardHTML(m, delay) {
            const tipo = m.tipoExibido;
            const valor = m.valorExibido;
            const titular = m['Titular Conta'] || m['Titular'] || '—';
            const icon = tipo === 'Entrada' ? 'fa-arrow-down text-emerald-500' :
                         tipo === 'Saída'   ? 'fa-arrow-up text-rose-500'     : 'fa-chart-line text-indigo-500';
            const classe = tipo === 'Entrada' ? 'card-entrada' :
                           tipo === 'Saída'   ? 'card-saida'   : 'card-rendimento';
            const valClass = tipo === 'Saída' ? 'text-rose-600' : tipo === 'Rendimento' ? 'text-indigo-600' : 'text-emerald-600';
            const sinal = tipo === 'Saída' ? '−' : '+';
            const chipColor = tipo === 'Entrada' ? 'bg-emerald-100 text-emerald-700' :
                              tipo === 'Saída'   ? 'bg-rose-100 text-rose-700'       : 'bg-indigo-100 text-indigo-700';

            return `
            <div class="glass-card p-4 rounded-2xl ${classe} mov-card active:scale-[0.99] transition-all"
                style="animation-delay:${delay}ms">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm shrink-0">
                            <i class="fas ${icon} text-sm"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2 flex-wrap mb-0.5">
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded-full ${chipColor}">${tipo}</span>
                                <span class="text-[10px] font-bold text-slate-400">${m.dataF}</span>
                            </div>
                            <h4 class="font-bold text-slate-700 text-sm truncate">${m['Banco']} <span class="font-normal text-slate-400">| ${m['Descrição']}</span></h4>
                            <p class="text-[10px] text-slate-400 italic truncate">
                                <i class="fas fa-user text-[9px] mr-1"></i>${titular}
                            </p>
                        </div>
                    </div>
                    <div class="shrink-0 text-right">
                        <p class="font-black text-sm ${valClass} whitespace-nowrap">${sinal} ${formatarMoeda(valor)}</p>
                    </div>
                </div>
            </div>`;
        }

        // =============================================
        // EXPORTAR PDF — layout limpo, legível no celular
        // =============================================
        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const area = document.getElementById('export-area-tecnica');
            const btn = document.getElementById('btnExport');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            mostrarToast('Gerando PDF...');

            // Coletar dados filtrados atuais direto das variáveis em memória
            const fConta  = document.getElementById('filtroConta').value;
            const fPer    = parseInt(document.getElementById('filtroPeriodo').value);
            const agora   = new Date();

            let filtrados = dadosRaw.filter(d => {
                const dt = new Date(d['Data']);
                const matchConta = fConta === 'TODAS' || String(d['ID Conta']) === fConta;
                let matchPer = true;
                if (fPer > 0) {
                    const lim = new Date(); lim.setMonth(agora.getMonth() - fPer);
                    matchPer = dt >= lim;
                }
                return matchConta && matchPer;
            });
            filtrados.sort((a, b) => new Date(b['Data']) - new Date(a['Data']));

            let sE = 0, sS = 0, sR = 0;
            const linhas = [];
            filtrados.forEach(mov => {
                const vA = parseFloat(mov['Valor Aporte']) || 0;
                const vR = parseFloat(mov['Valor Rendimento']) || 0;
                const titular = mov['Titular Conta'] || mov['Titular'] || '—';
                const dataF   = new Date(mov['Data']).toLocaleDateString('pt-br');
                if (vA > 0 && (filtroTipoAtivo === 'TODOS' || filtroTipoAtivo === mov['Tipo'])) {
                    if (mov['Tipo'] === 'Entrada') sE += vA; else sS += vA;
                    linhas.push({ data: dataF, banco: mov['Banco'], desc: mov['Descrição'], titular, valor: vA, tipo: mov['Tipo'] });
                }
                if (vR > 0 && (filtroTipoAtivo === 'TODOS' || filtroTipoAtivo === 'Rendimento')) {
                    sR += vR;
                    linhas.push({ data: dataF, banco: mov['Banco'], desc: mov['Descrição'], titular, valor: vR, tipo: 'Rendimento' });
                }
            });

            // Filtro legível
            const nomeConta  = fConta === 'TODAS' ? 'Todas as Contas' :
                               (document.getElementById('filtroConta').options[document.getElementById('filtroConta').selectedIndex]?.text || fConta);
            const nomePer    = fPer === 0 ? 'Todo o histórico' : fPer === 1 ? 'Último mês' : fPer === 3 ? 'Últimos 3 meses' : 'Último ano';
            const nomeTipo   = { 'TODOS': 'Todos os tipos', 'Entrada': 'Entradas', 'Saída': 'Saídas', 'Rendimento': 'Rendimentos' }[filtroTipoAtivo];

            // Cor por tipo
            function corTipo(t) {
                return t === 'Entrada' ? { bg:'#f0fdf4', border:'#10b981', txt:'#065f46', badge:'#10b981', badgeTxt:'#fff' }
                     : t === 'Saída'   ? { bg:'#fff1f2', border:'#f43f5e', txt:'#9f1239', badge:'#f43f5e', badgeTxt:'#fff' }
                     :                  { bg:'#eef2ff', border:'#6366f1', txt:'#3730a3', badge:'#6366f1', badgeTxt:'#fff' };
            }

            // Linhas da tabela
            const rowsHTML = linhas.map((l, i) => {
                const c = corTipo(l.tipo);
                return `<tr style="background:${i % 2 === 0 ? '#ffffff' : '#f8fafc'}">
                    <td style="padding:14px 16px;font-size:13px;color:#64748b;white-space:nowrap;border-bottom:1px solid #f1f5f9">${l.data}</td>
                    <td style="padding:14px 16px;border-bottom:1px solid #f1f5f9">
                        <span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:${c.badge};color:${c.badgeTxt}">${l.tipo}</span>
                    </td>
                    <td style="padding:14px 16px;border-bottom:1px solid #f1f5f9">
                        <div style="font-weight:700;font-size:13px;color:#1e293b">${l.banco}</div>
                        <div style="font-size:11px;color:#94a3b8">${l.desc}</div>
                        <div style="font-size:11px;color:#94a3b8;font-style:italic">${l.titular}</div>
                    </td>
                    <td style="padding:14px 16px;text-align:right;font-weight:800;font-size:14px;color:${c.txt};white-space:nowrap;border-bottom:1px solid #f1f5f9">
                        ${l.tipo === 'Saída' ? '−' : '+'} ${formatarMoeda(l.valor)}
                    </td>
                </tr>`;
            }).join('');

            const saldo = sE + sR - sS;

            area.innerHTML = `
            <div style="font-family:'Plus Jakarta Sans',Arial,sans-serif;background:#f8fafc;padding:48px 48px 64px;min-width:700px;max-width:900px">

                <!-- Cabeçalho -->
                <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #6366f1;padding-bottom:24px;margin-bottom:28px">
                    <div>
                        <div style="font-size:42px;font-weight:900;color:#1e293b;line-height:1">Poppe<span style="color:#6366f1">Fin</span></div>
                        <div style="font-size:14px;font-weight:700;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:0.08em">Relatório Financeiro</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:12px;color:#94a3b8;font-weight:600">Gerado em</div>
                        <div style="font-size:14px;font-weight:700;color:#475569">${new Date().toLocaleString('pt-br')}</div>
                    </div>
                </div>

                <!-- Filtros aplicados -->
                <div style="background:#eef2ff;border-radius:16px;padding:16px 20px;margin-bottom:28px;display:flex;gap:24px;flex-wrap:wrap">
                    <div>
                        <div style="font-size:10px;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:0.08em">Conta</div>
                        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-top:2px">${nomeConta}</div>
                    </div>
                    <div>
                        <div style="font-size:10px;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:0.08em">Período</div>
                        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-top:2px">${nomePer}</div>
                    </div>
                    <div>
                        <div style="font-size:10px;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:0.08em">Tipo</div>
                        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-top:2px">${nomeTipo}</div>
                    </div>
                    <div>
                        <div style="font-size:10px;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:0.08em">Registros</div>
                        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-top:2px">${linhas.length}</div>
                    </div>
                </div>

                <!-- Cards de resumo -->
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px">
                    <div style="background:#f0fdf4;border-radius:16px;padding:18px 16px;border-top:4px solid #10b981">
                        <div style="font-size:10px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Entradas</div>
                        <div style="font-size:18px;font-weight:900;color:#065f46">${formatarMoeda(sE)}</div>
                    </div>
                    <div style="background:#fff1f2;border-radius:16px;padding:18px 16px;border-top:4px solid #f43f5e">
                        <div style="font-size:10px;font-weight:800;color:#f43f5e;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Saídas</div>
                        <div style="font-size:18px;font-weight:900;color:#9f1239">${formatarMoeda(sS)}</div>
                    </div>
                    <div style="background:#eef2ff;border-radius:16px;padding:18px 16px;border-top:4px solid #6366f1">
                        <div style="font-size:10px;font-weight:800;color:#6366f1;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Rendimento</div>
                        <div style="font-size:18px;font-weight:900;color:#3730a3">${formatarMoeda(sR)}</div>
                    </div>
                    <div style="background:${saldo >= 0 ? '#f0fdf4' : '#fff1f2'};border-radius:16px;padding:18px 16px;border-top:4px solid ${saldo >= 0 ? '#1e293b' : '#f43f5e'}">
                        <div style="font-size:10px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">Saldo Líquido</div>
                        <div style="font-size:18px;font-weight:900;color:${saldo >= 0 ? '#1e293b' : '#9f1239'}">${formatarMoeda(saldo)}</div>
                    </div>
                </div>

                <!-- Tabela de movimentações -->
                <div style="font-size:12px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">
                    Movimentações
                </div>
                <div style="border-radius:16px;overflow:hidden;border:1px solid #e2e8f0">
                    <table style="width:100%;border-collapse:collapse">
                        <thead>
                            <tr style="background:#1e293b">
                                <th style="padding:14px 16px;text-align:left;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em">Data</th>
                                <th style="padding:14px 16px;text-align:left;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em">Tipo</th>
                                <th style="padding:14px 16px;text-align:left;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em">Conta / Titular</th>
                                <th style="padding:14px 16px;text-align:right;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em">Valor</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHTML.length > 0 ? rowsHTML : `<tr><td colspan="4" style="text-align:center;padding:40px;color:#94a3b8;font-size:14px">Nenhum registro encontrado</td></tr>`}</tbody>
                    </table>
                </div>

                <!-- Rodapé -->
                <div style="margin-top:40px;text-align:center;font-size:11px;color:#cbd5e1;font-weight:600;border-top:1px solid #e2e8f0;padding-top:20px">
                    Documento gerado automaticamente pelo Sistema PoppeFin &nbsp;·&nbsp; ${new Date().toLocaleDateString('pt-br')}
                </div>
            </div>`;

            try {
                const canvas = await html2canvas(area, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#f8fafc',
                    windowWidth: 900,
                    logging: false
                });
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth  = 210;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                const pdf = new jsPDF('p', 'mm', [pdfWidth, pdfHeight]);
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
                const data = new Date().toLocaleDateString('pt-br').replace(/\//g,'-');
                pdf.save(`PoppeFin_Relatorio_${data}.pdf`);
                mostrarToast('PDF gerado com sucesso ✓');
            } catch (err) {
                mostrarToast('Erro ao gerar PDF');
                console.error(err);
            } finally {
                btn.innerHTML = '<i class="fas fa-file-pdf"></i><span class="hidden md:inline"> Exportar PDF</span>';
                area.innerHTML = '';
            }
        }

        // Atributo data-tipo nos chips
        document.querySelectorAll('.tipo-chip').forEach((chip, i) => {
            const tipos = ['TODOS', 'Entrada', 'Saída', 'Rendimento'];
            chip.setAttribute('data-tipo', tipos[i]);
        });

        iniciarSessao();
        carregarDados();
    </script>
</body>
</html>
