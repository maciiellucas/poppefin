<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoppeFin | Novo Lançamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255,255,255,0.3) inset;
        }

        .input-style {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.6);
            transition: all 0.25s ease;
        }

        .input-style:focus {
            background: white;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .disabled-input {
            opacity: 0.4;
            background: rgba(203, 213, 225, 0.3) !important;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .read-only-panel {
            background: rgba(241, 245, 249, 0.6);
            border-radius: 20px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-left: 4px;
            margin-bottom: 6px;
        }

        .success-toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 14px 22px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            z-index: 100;
            animation: slideIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
            z-index: 50;
            padding: 8px 0 env(safe-area-inset-bottom);
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-start justify-center p-4 pt-6" style="padding-bottom: 120px;">

    <div id="successToast" class="success-toast items-center gap-3">
        <i class="fas fa-check-circle text-xl"></i>
        <span class="font-bold">Lançamento registrado com sucesso!</span>
    </div>

    <div class="max-w-xl w-full glass-card rounded-[32px] overflow-hidden">
        <div class="p-8 md:p-10">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <button onclick="window.location.href='dashboard.html'" class="text-indigo-500 font-bold text-xs mb-2 flex items-center gap-1.5 hover:text-indigo-700 transition-colors">
                        <i class="fas fa-arrow-left text-[10px]"></i> Voltar ao Dashboard
                    </button>
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">
                        Poppe<span class="text-indigo-600">Fin</span>
                    </h1>
                    <div id="statusIndicator" class="flex items-center gap-1.5 mt-1.5">
                        <span class="h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sincronizando</span>
                    </div>
                </div>
                <div class="h-14 w-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <i class="fas fa-plus text-xl"></i>
                </div>
            </div>

            <form id="financeForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="section-label">ID Conta</label>
                        <input type="text" id="idConta" placeholder="Ex: 1" required list="contasData" 
                            class="input-style w-full rounded-2xl p-4 outline-none text-slate-700 font-bold">
                        <datalist id="contasData"></datalist>
                    </div>
                    <div class="space-y-1.5">
                        <label class="section-label">Fluxo</label>
                        <select id="tipo" class="input-style w-full rounded-2xl p-4 outline-none text-slate-700 font-bold cursor-pointer appearance-none">
                            <option value="Entrada">🟢 Entrada</option>
                            <option value="Saída">🔴 Saída</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="section-label">Valor Principal</label>
                        <input type="text" id="valorAporteDisplay" placeholder="R$ 0,00"
                            class="input-style w-full rounded-2xl p-4 outline-none text-emerald-600 font-black">
                    </div>
                    <div class="space-y-1.5">
                        <label class="section-label">Rendimento</label>
                        <input type="text" id="valorRendimentoDisplay" placeholder="R$ 0,00"
                            class="input-style w-full rounded-2xl p-4 outline-none text-indigo-600 font-black">
                    </div>
                </div>

                <div class="read-only-panel p-5 space-y-3 border border-dashed border-indigo-200/60">
                    <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest"><i class="fas fa-calculator mr-1.5"></i> Calc. Automática de Rendimento</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1.5">Saldo Sistema</p>
                            <input type="text" id="saldoSistema" readonly placeholder="R$ 0,00" class="bg-white/60 w-full text-slate-500 font-bold outline-none p-3 rounded-xl text-sm border border-slate-100" data-valor-bruto="0">
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1.5">Valor Conta Real</p>
                            <input type="text" id="valorRealDisplay" placeholder="R$ 0,00" class="input-style w-full text-slate-700 font-bold outline-none p-3 rounded-xl text-sm transition-all">
                        </div>
                        <div>
                            <button type="button" id="btnCalcularRend" class="w-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 active:scale-[0.97] font-bold py-3 rounded-xl text-sm transition-all shadow-sm flex items-center justify-center gap-2">
                                <i class="fas fa-magic"></i> Calcular
                            </button>
                        </div>
                    </div>
                </div>

                <div class="read-only-panel p-5 space-y-4 border border-slate-100/80">
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1">
                            <p class="section-label">Banco</p>
                            <input type="text" id="banco" readonly placeholder="---" class="bg-transparent w-full text-slate-700 font-bold outline-none text-sm">
                        </div>
                        <div class="col-span-2">
                            <p class="section-label">Descrição</p>
                            <input type="text" id="descricao" readonly placeholder="Aguardando ID..." class="bg-transparent w-full text-slate-700 font-bold outline-none">
                        </div>
                    </div>
                    <div class="pt-3 border-t border-slate-200">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Titular da Conta</p>
                        <input type="text" id="titular" readonly class="bg-transparent w-full text-slate-500 text-sm italic outline-none">
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-gradient-to-r from-slate-800 to-slate-700 hover:from-indigo-600 hover:to-indigo-500 text-white font-bold py-5 rounded-2xl shadow-lg shadow-slate-200 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                    <span>Confirmar Lançamento</span>
                    <i class="fas fa-arrow-right text-sm opacity-60"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Bottom Nav (mobile) -->
    <nav class="bottom-nav md:hidden">
        <div class="relative flex items-center justify-around px-2 h-16">
            <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-slate-400 flex-1 py-2">
                <i class="fas fa-chart-pie text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-wide">Dashboard</span>
            </button>
            <button onclick="window.location.href='extrato.html'" class="flex flex-col items-center gap-1 text-slate-400 flex-1 py-2">
                <i class="fas fa-list-ul text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-wide">Extrato</span>
            </button>
            <div class="flex-1 flex items-center justify-center">
                <button class="absolute w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg shadow-indigo-300"
                    style="bottom: 20px;">
                    <i class="fas fa-plus text-white text-xl"></i>
                </button>
            </div>
            <button class="flex flex-col items-center gap-1 text-slate-300 flex-1 py-2 opacity-40 cursor-default">
                <i class="fas fa-file-pdf text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-wide">PDF</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-300 flex-1 py-2 opacity-40 cursor-default">
                <i class="fas fa-sync-alt text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-wide">Sync</span>
            </button>
        </div>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoapiR4Mtjic8yLSjCcZ4I1dsClIMyV6ReaPmzYmNxKa4wUpEEAKUGBnDmc_XAqxZ1Bw/exec';
        let baseContas = [];
        let transacoesSistema = []; // Armazena dados do dashboard para o cálculo de saldo

        function formatarMoeda(valor) {
            valor = valor.replace(/\D/g, "");
            valor = (valor / 100).toFixed(2) + "";
            valor = valor.replace(".", ",");
            valor = valor.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            valor = valor.replace(/(\d)(\d{3}),/g, "$1.$2,");
            return "R$ " + valor;
        }

        function descascarMoeda(valorStr) {
            if (!valorStr || valorStr === "R$ 0,00") return 0;
            return parseFloat(valorStr.replace("R$ ", "").replace(/\./g, "").replace(",", "."));
        }

        function gerenciarBloqueio() {
            const principal = document.getElementById('valorAporteDisplay');
            const rendimento = document.getElementById('valorRendimentoDisplay');
            const valorReal = document.getElementById('valorRealDisplay');
            const btnCalcular = document.getElementById('btnCalcularRend');

            if (descascarMoeda(principal.value) > 0) {
                // Bloqueia o campo de Rendimento e a Calculadora
                rendimento.disabled = true;
                rendimento.classList.add('disabled-input');
                rendimento.value = "R$ 0,00";
                
                valorReal.disabled = true;
                valorReal.classList.add('disabled-input');
                valorReal.value = "R$ 0,00";
                btnCalcular.disabled = true;
                btnCalcular.classList.add('disabled-input');
            } else if (descascarMoeda(rendimento.value) > 0) {
                // Bloqueia o Aporte Principal, mas mantém a Calculadora livre caso queira refazer a conta
                principal.disabled = true;
                principal.classList.add('disabled-input');
                principal.value = "R$ 0,00";

                valorReal.disabled = false;
                valorReal.classList.remove('disabled-input');
                btnCalcular.disabled = false;
                btnCalcular.classList.remove('disabled-input');
            } else {
                // Tudo liberado
                principal.disabled = false;
                rendimento.disabled = false;
                principal.classList.remove('disabled-input');
                rendimento.classList.remove('disabled-input');
                
                valorReal.disabled = false;
                valorReal.classList.remove('disabled-input');
                btnCalcular.disabled = false;
                btnCalcular.classList.remove('disabled-input');
            }
        }

        [document.getElementById('valorAporteDisplay'), document.getElementById('valorRendimentoDisplay'), document.getElementById('valorRealDisplay')].forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = formatarMoeda(e.target.value);
                if(e.target.id !== 'valorRealDisplay') gerenciarBloqueio();
            });
        });

        // Carrega Contas
        async function loadContas() {
            const status = document.getElementById('statusIndicator');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getContas&t=${Date.now()}`);
                const data = await response.json();
                baseContas = data;
                
                const datalist = document.getElementById('contasData');
                datalist.innerHTML = '';
                baseContas.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c.ID;
                    const bancoInfo = c.BANCO || "";
                    const descInfo = c.DESCRIÇÃO || "";
                    const titularInfo = c['TITULAR CONTA'] || c['TITULAR'] || "";
                    opt.textContent = `${bancoInfo} | ${descInfo} | ${titularInfo}`;
                    datalist.appendChild(opt);
                });
                
                // Só muda pra conectado se carregar os dois (contas e transações)
                if(transacoesSistema.length > 0) {
                    status.innerHTML = '<span class="h-2 w-2 rounded-full bg-emerald-400"></span><span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Conectado</span>';
                }
            } catch (e) {
                status.innerHTML = '<span class="h-2 w-2 rounded-full bg-red-400"></span><span class="text-[10px] font-bold text-red-600 uppercase tracking-widest">Erro</span>';
            }
        }

        // Carrega Transações (Para montar o "Saldo Sistema")
        async function loadTransacoesSistema() {
            const status = document.getElementById('statusIndicator');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getDashboard&t=${Date.now()}`);
                transacoesSistema = await response.json();
                
                if(baseContas.length > 0) {
                    status.innerHTML = '<span class="h-2 w-2 rounded-full bg-emerald-400"></span><span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Conectado</span>';
                }
            } catch (e) {
                console.error("Erro ao puxar transações pro Saldo", e);
            }
        }

        document.getElementById('idConta').addEventListener('input', (e) => {
            const idBuscado = e.target.value.trim();
            const conta = baseContas.find(c => String(c.ID).trim() === idBuscado);
            
            if (conta) {
                document.getElementById('banco').value = conta.BANCO || "";
                document.getElementById('descricao').value = conta.DESCRIÇÃO || "";
                document.getElementById('titular').value = conta['TITULAR CONTA'] || conta['TITULAR'] || "";
                document.getElementById('descricao').style.color = "#4f46e5";

                // Calcula e preenche o Saldo do Sistema dinamicamente
                let saldoAtual = 0;
                transacoesSistema.forEach(d => {
                    if (String(d['ID Conta']).trim() === idBuscado) {
                        const vAporte = parseFloat(d['Valor Aporte']) || 0;
                        const vRend = parseFloat(d['Valor Rendimento']) || 0;
                        if (d['Tipo'] === 'Entrada') saldoAtual += vAporte;
                        else if (d['Tipo'] === 'Saída') saldoAtual -= vAporte;
                        saldoAtual += vRend;
                    }
                });

                document.getElementById('saldoSistema').value = saldoAtual.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
                document.getElementById('saldoSistema').dataset.valorBruto = saldoAtual;

            } else {
                ['banco', 'descricao', 'titular', 'saldoSistema'].forEach(id => {
                    document.getElementById(id).value = '';
                    if(id === 'descricao') document.getElementById(id).style.color = "";
                    if(id === 'saldoSistema') document.getElementById(id).dataset.valorBruto = "0";
                });
            }
        });

        // Ação do Botão Calcular Rendimento Automático
        document.getElementById('btnCalcularRend').addEventListener('click', () => {
            const saldoSistemaBruto = document.getElementById('saldoSistema').dataset.valorBruto;
            const valorReal = descascarMoeda(document.getElementById('valorRealDisplay').value);
            
            if (!document.getElementById('idConta').value) {
                alert("Preencha um ID de Conta primeiro!");
                return;
            }

            if (valorReal <= 0) {
                alert("Preencha o Valor Real na conta!");
                return;
            }
            
            const saldoSist = parseFloat(saldoSistemaBruto) || 0;
            const rendimentoCalc = valorReal - saldoSist;
            
            if (rendimentoCalc > 0) {
                // Transforma o float calcado em formato para a nossa função de moeda processar (ex: 100.50 -> "10050")
                const valorFormatado = Math.round(rendimentoCalc * 100).toString(); 
                document.getElementById('valorRendimentoDisplay').value = formatarMoeda(valorFormatado);
                
                // Força a validação de bloqueio
                gerenciarBloqueio();
            } else {
                alert("O valor real informado é menor ou igual ao saldo que já existe no sistema.");
            }
        });

        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            if (!document.getElementById('banco').value) { alert("ID Inválido!"); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gravando...';

            const payload = {
                idConta: document.getElementById('idConta').value,
                tipo: document.getElementById('tipo').value,
                valorAporte: descascarMoeda(document.getElementById('valorAporteDisplay').value),
                valorRendimento: descascarMoeda(document.getElementById('valorRendimentoDisplay').value),
                descricao: document.getElementById('descricao').value,
                banco: document.getElementById('banco').value,
                titular: document.getElementById('titular').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                const toast = document.getElementById('successToast');
                toast.style.display = 'flex';
                setTimeout(() => toast.style.display = 'none', 3000);

                e.target.reset();
                ['banco', 'descricao', 'titular', 'saldoSistema', 'valorRealDisplay'].forEach(id => {
                    document.getElementById(id).value = '';
                    if(id === 'descricao') document.getElementById(id).style.color = "";
                    if(id === 'saldoSistema') document.getElementById(id).dataset.valorBruto = "0";
                });
                
                // Reseta estados visuais
                document.getElementById('valorAporteDisplay').disabled = false;
                document.getElementById('valorRendimentoDisplay').disabled = false;
                document.getElementById('valorRealDisplay').disabled = false;
                document.getElementById('btnCalcularRend').disabled = false;
                
                document.getElementById('valorAporteDisplay').classList.remove('disabled-input');
                document.getElementById('valorRendimentoDisplay').classList.remove('disabled-input');
                document.getElementById('valorRealDisplay').classList.remove('disabled-input');
                document.getElementById('btnCalcularRend').classList.remove('disabled-input');

            } catch (err) {
                alert('Erro ao salvar.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Confirmar Lançamento</span><i class="fas fa-arrow-right text-sm opacity-50"></i>';
            }
        });

        // Inicializa as chamadas em paralelo
        loadContas();
        loadTransacoesSistema();
    </script>
</body>
</html>
